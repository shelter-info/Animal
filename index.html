<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>동물 보호소 정보 아카이브</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#1f3a5f;
color:white;
padding:20px;
text-align:center;
}

.notice{
background:#e9eef6;
text-align:center;
padding:12px;
font-weight:bold;
}

.guide{
background:#fff3cd;
border-left:5px solid #ffc107;
padding:10px;
margin:20px auto;
width:850px;
font-size:13px;
line-height:1.0;
}

.container{
width:900px;
margin:auto;
}

.search{
margin-top:20px;
}

.search input{
width:100%;
padding:10px;
font-size:16px;
}

.filter{
margin-top:10px;
}

.filter button{
margin-right:10px;
padding:6px 12px;
cursor:pointer;
border:none;
background:#ddd;
}

.filter button:hover{
background:#bbb;
}

.list{
background:white;
padding:20px;
margin-top:20px;
border-radius:6px;
}

.item{
padding:15px 0;
border-bottom:1px solid #ddd;
}

.item:last-child{
border-bottom:none;
}

.label{
font-weight:bold;
}

a{
color:#1f3a5f;
text-decoration:none;
}

.type{
font-weight:bold;
margin-bottom:5px;
}

</style>

</head>

<body>

<header>
<h1>동물 보호소 정보 아카이브</h1>
</header>

<div class="notice">
펫샵과 진짜 보호소 리스트
</div>

<div class="guide">
<p>해당 업체에 유난히 <b>6개월 미만의 어린 개체</b>가 많다? → <b>펫샵으로 의심!</b></p>
<p>보호소인데 <b>동물판매업</b>으로 등록되어 있다? → <b>100% 펫샵</b></p>
</div>

<div class="container">

<div class="search">
<input type="text" id="search" placeholder="업체 이름 / 주소 검색">
</div>

<div class="filter">
<button onclick="filterType('all')">전체</button>
<button onclick="filterType('petshop')">펫샵</button>
<button onclick="filterType('shelter')">진짜 보호소</button>
</div>

<div class="list" id="list"></div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
