<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>펫샵 정보 아카이브</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#1f3a5f;   /* 남색 배너 */
color:white;
padding:20px;
text-align:center;
}

.notice{
background:#e9eef6;
text-align:center;
padding:12px;
font-weight:bold;
}

.container{
width:900px;
margin:auto;
}

.list{
background:white;
padding:20px;
margin-top:20px;
border-radius:6px;
}

.item{
padding:15px 0;
border-bottom:1px solid #ddd;
}

.item:last-child{
border-bottom:none;
}

.label{
font-weight:bold;
}

a{
color:#1f3a5f;
text-decoration:none;
}

</style>
</head>

<body>

<header>
<h1>동물보호소 정보 아카이브</h1>
</header>

<div class="notice">
여기 있는 업체는 모두 펫샵입니다
</div>

<div class="container">

<div class="list">

<div class="item">
<div><span class="label">업체 이름:</span> 안다동물보호소</div>
<div><span class="label">인스타그램:</span> 
<a href="https://www.instagram.com/anda_animals_shelter/" target="_blank">
instagram.com/anda_animals_shelter
</a>
</div>
<div><span class="label">주소:</span> 경기도 평택시 오좌동길 47-48</div>
<div><span class="label">사업자등록번호:</span> 000-00-00000</div>
</div>

</div>

</div>

</body>
</html>
