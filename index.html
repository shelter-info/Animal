<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>펫샵 정보 아카이브</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#1f3a5f;
color:white;
padding:20px;
text-align:center;
}

.notice{
background:#e9eef6;
text-align:center;
padding:12px;
font-weight:bold;
}

.container{
width:900px;
margin:auto;
}

.search{
margin-top:20px;
}

.search input{
width:100%;
padding:10px;
font-size:16px;
}

.list{
background:white;
padding:20px;
margin-top:20px;
border-radius:6px;
}

.item{
padding:15px 0;
border-bottom:1px solid #ddd;
}

.label{
font-weight:bold;
}

a{
color:#1f3a5f;
text-decoration:none;
}

</style>
</head>

<body>

<header>
<h1>동물보호소 정보 아카이브</h1>
</header>

<div class="notice">
여기 있는 업체는 모두 펫샵입니다
</div>

<div class="container">

<div class="search">
<input type="text" id="search" placeholder="업체 이름 / 주소 검색">
</div>

<div class="list" id="list"></div>

</div>

<script src="script.js"></script>

</body>
</html>
