<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>보호소 정보 아카이브</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#e74c3c;
color:white;
padding:20px;
text-align:center;
}

.container{
width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

#map{
height:450px;
margin-top:20px;
}

a{
color:#2980b9;
}

</style>

</head>

<body>

<header>
<h1>동물 보호소 정보 아카이브</h1>
<p>보호소 정보를 투명하게 공개하는 프로젝트</p>
</header>

<div class="container">

<div class="card">

<h2>안다동물보호소</h2>

<p><b>보호소 이름</b><br>
안다동물보호소</p>

<p><b>인스타그램</b><br>
<a href="https://www.instagram.com/anda_animals_shelter/" target="_blank">
anda_animals_shelter
</a><br>

<a href="https://www.instagram.com/anda_hugu/" target="_blank">
anda_hugu
</a>
</p>

<p><b>주소</b><br>
경기도 평택시 오좌동길 47-48</p>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([37.014,127.093], 12);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 19
}).addTo(map);

L.marker([37.014,127.093]).addTo(map)
.bindPopup("안다동물보호소");

</script>

</body>
</html>
